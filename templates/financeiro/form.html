{% extends "base.html" %}
{% block titulo %}Nova Movimentação Financeira{% endblock %}

{% block conteudo %}
<div class="cabecalho-secao">
    <h2>Nova Movimentação Financeira</h2>
    <a href="/financeiro" class="btn btn-secundario">← Voltar</a>
</div>

<div class="card-form">
    <form method="post">
        <div class="grade-form">
            <div class="campo">
                <label>Tipo *</label>
                <select name="tipo" required>
                    <option value="entrada">Entrada</option>
                    <option value="saida">Saída</option>
                </select>
            </div>
            <div class="campo">
                <label>Categoria *</label>
                <select name="categoria" required>
                    <option value="mensalidade">Mensalidade</option>
                    <option value="doacao">Doação</option>
                    <option value="livro">Livro/Material</option>
                    <option value="manutencao">Manutenção</option>
                    <option value="energia">Energia</option>
                    <option value="agua">Água</option>
                    <option value="aluguel">Aluguel</option>
                    <option value="alimentacao">Alimentação</option>
                    <option value="transporte">Transporte</option>
                    <option value="outros">Outros</option>
                </select>
            </div>
            <div class="campo">
                <label>Valor (R$) *</label>
                <input type="number" name="valor" step="0.01" min="0" value="0" required>
            </div>
            <div class="campo">
                <label>Data</label>
                <input type="date" name="data_movimentacao"
                       value="">
            </div>
            <div class="campo">
                <label>Status</label>
                <select name="status">
                    <option value="pago">Pago</option>
                    <option value="pendente">Pendente</option>
                </select>
            </div>
            <div class="campo">
                <label>Trabalhador</label>
                <select name="trabalhador_id">
                    <option value="">-- Nenhum --</option>
                    {% for t in trabalhadores %}
                    <option value="{{ t.id }}">{{ t.nome_completo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="campo">
                <label>Pessoa</label>
                <select name="pessoa_id">
                    <option value="">-- Nenhum --</option>
                    {% for p in pessoas %}
                    <option value="{{ p.id }}">{{ p.nome_completo }}</option>
                    {% endfor %}
                </select>
            </div>
            <div class="campo campo-largo">
                <label>Descrição</label>
                <input type="text" name="descricao" placeholder="Detalhes da movimentação">
            </div>
            <div class="campo campo-largo" id="campo-pix" style="display:none">
                <label>PIX Copia e Cola</label>
                <input type="text" name="pix_copiadecola" placeholder="Código PIX">
            </div>
        </div>

        <div class="acoes-form">
            <button type="submit" class="btn btn-primario">Salvar</button>
            <a href="/financeiro" class="btn btn-secundario">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}

{% block scripts %}
<script>
(function() {
    const tipoSelect = document.querySelector('select[name="tipo"]');
    const catSelect = document.querySelector('select[name="categoria"]');
    const campoPix = document.getElementById('campo-pix');

    // Mostra campo PIX quando categoria é mensalidade ou doação entrada
    catSelect.addEventListener('change', function() {
        const cat = this.value;
        const tipo = tipoSelect.value;
        campoPix.style.display = (cat === 'mensalidade' || cat === 'doacao' && tipo === 'entrada') ? '' : 'none';
    });

    // Default date hoje
    const dateInput = document.querySelector('input[type="date"]');
    if (dateInput && !dateInput.value) {
        dateInput.value = new Date().toISOString().split('T')[0];
    }
})();
</script>
{% endblock %}
