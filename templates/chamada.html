<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ centro.centro_nome }} — Chamada</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #0d2d5e;
            color: #fff;
            font-family: system-ui, -apple-system, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: flex-start;
            padding-left: 8vw;
            user-select: none;
            transition: background 0.6s ease;
            overflow: hidden;
        }

        .cabecalho {
            position: fixed;
            bottom: 1.2rem;
            display: flex;
            align-items: center;
            gap: .6rem;
            opacity: .45;
        }

        .logo-chamada {
            width: 28px;
        }

        .titulo {
            font-size: .95rem;
            letter-spacing: .18em;
            text-transform: uppercase;
        }

        .label {
            font-size: clamp(.75rem, 1.5vw, 1rem);
            letter-spacing: .2em;
            text-transform: uppercase;
            color: rgba(255,255,255,.6);
            margin-bottom: .5rem;
        }

        .codigo {
            font-size: clamp(15rem, 50vw, 35rem);
            font-weight: 900;
            line-height: 0.95;
            color: #fff;
            letter-spacing: .04em;
            text-shadow: 0 4px 40px rgba(0,0,0,.3);
        }

        .codigo.entrada {
            animation: entrada 5s ease forwards;
        }

        @keyframes entrada {
            0%   { transform: scale(.05); opacity: 0; }
            12%  { transform: scale(1.2);  opacity: 1; }
            20%  { transform: scale(.92); }
            30%  { transform: scale(1.1); }
            40%  { transform: scale(.96); }
            52%  { transform: scale(1.06); }
            63%  { transform: scale(.98); }
            75%  { transform: scale(1.03); }
            88%  { transform: scale(1.0); }
            100% { transform: scale(1.0); }
        }

        .aguardando {
            font-size: clamp(1rem, 3vw, 2rem);
            color: rgba(255,255,255,.2);
            letter-spacing: .1em;
        }

        .status {
            position: fixed;
            bottom: .8rem;
            right: 1.2rem;
            font-size: .7rem;
            color: rgba(255,255,255,.18);
        }

        #painel-historico {
            position: fixed;
            right: 2vw;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2rem;
            height: 90vh;
        }

        .historico-titulo {
            font-size: clamp(1.8rem, 4vw, 3rem);
            letter-spacing: .25em;
            text-transform: uppercase;
            color: rgba(255,255,255,.5);
            margin-bottom: 2rem;
            white-space: nowrap;
            font-weight: 600;
        }

        #lista-historico {
            list-style: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 2.5rem;
            height: 100%;
            flex-grow: 1;
        }

        #lista-historico li {
            font-size: clamp(7rem, 20vw, 18rem);
            font-weight: 900;
            color: rgba(255,255,255,.35);
            letter-spacing: .04em;
            line-height: 1;
            text-shadow: 0 2px 20px rgba(0,0,0,.3);
        }
    </style>
</head>
<body>
    <div class="cabecalho">
        {% if centro.centro_logo %}
        <img src="/static/logos/{{ centro.centro_logo }}" alt="Logo" class="logo-chamada">
        {% else %}
        <img src="/static/logo-branca.svg" alt="Logo" class="logo-chamada">
        {% endif %}
        <span class="titulo">{{ centro.centro_nome }}</span>
    </div>

    <div id="conteudo-codigo" style="text-align:center">
        <div class="aguardando">aguardando chamada…</div>
    </div>

    <div id="painel-historico" style="display:none">
        <div class="historico-titulo">anteriores</div>
        <ul id="lista-historico"></ul>
    </div>

    <div class="status" id="status">conectando…</div>

    <script>
        const conteudo = document.getElementById("conteudo-codigo");
        const statusEl = document.getElementById("status");
        const painel = document.getElementById("painel-historico");
        const lista = document.getElementById("lista-historico");

        const cores = [
            "#0D47A1",  // azul royal
            "#B71C1C",  // vermelho
            "#E65100",  // laranja
            "#1B5E20",  // verde
            "#4A148C",  // roxo
            "#004D40",  // verde-azulado
        ];
        let indiceCor = 0;

        function proximaCor() {
            indiceCor = (indiceCor + 1) % cores.length;
            document.body.style.background = cores[indiceCor];
        }

        function mostrarChamada(data) {
            proximaCor();
            conteudo.innerHTML = `
                <div class="label">senha</div>
                <div class="codigo entrada" id="cod">${data.codigo}</div>
            `;
            if (data.historico && data.historico.length > 0) {
                const unicos = [...new Set(data.historico)];
                lista.innerHTML = unicos.map(c => `<li>${c}</li>`).join('');
                painel.style.display = 'flex';
            } else {
                painel.style.display = 'none';
            }
        }

        function conectar() {
            const proto = location.protocol === "https:" ? "wss" : "ws";
            const ws = new WebSocket(`${proto}://${location.host}/chamada/ws`);

            ws.onopen = () => {
                statusEl.textContent = "conectado";
            };

            ws.onmessage = (ev) => {
                const data = JSON.parse(ev.data);
                mostrarChamada(data);
            };

            ws.onclose = () => {
                statusEl.textContent = "desconectado — reconectando…";
                setTimeout(conectar, 3000);
            };

            ws.onerror = () => ws.close();
        }

        fetch('/chamada/ultimo')
            .then(r => r.json())
            .then(d => { if (d.codigo) mostrarChamada(d); })
            .catch(() => {});

        conectar();
    </script>
</body>
</html>
