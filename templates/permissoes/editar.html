{% extends "base.html" %}
{% block titulo %}Editar Grupo – {{ grupo.nome }}{% endblock %}
{% block conteudo %}
<h1>Editar Grupo</h1>

<form method="post" action="/cadastros/permissoes/{{ grupo.id }}/editar" class="form-grupo">
    <input type="hidden" name="id" value="{{ grupo.id }}">

    <div class="form-linha">
        <label for="nome">Nome</label>
        <input type="text" id="nome" name="nome" value="{{ grupo.nome }}" required>
    </div>
    <div class="form-linha">
        <label for="descricao">Descrição</label>
        <input type="text" id="descricao" name="descricao" value="{{ grupo.descricao }}">
    </div>

    <div class="form-grupo">
        <h2>Módulos acessíveis</h2>
        <div class="modulos-grid">
            {% for modulo, rotulo in todos_modulos.items() %}
            <label class="modulo-item">
                <input type="checkbox"
                       name="modulos"
                       value="{{ modulo }}"
                       {% if modulo in permissoes_set %}checked{% endif %}>
                {{ rotulo }}
            </label>
            {% endfor %}
        </div>
    </div>

    <button type="submit" class="btn btn-primario">Salvar</button>
</form>

<a href="/cadastros/permissoes" class="btn btn-secundario">← Voltar</a>
{% endblock %}
